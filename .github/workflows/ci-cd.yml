name: CI/CD Workflow

on:
  push:
    branches: [ "main", "bingozhang" ]
  # 手动触发
  workflow_dispatch:
    inputs:
      build_agent:
        description: '是否构建并推送 cover-agent 镜像到 Docker Hub'
        required: true
        type: boolean
        default: false

# 环境变量，docker hub仓库地址
env:
  DOCKER_HUB_REPO_SERVER: ${{ secrets.DOCKER_USERNAME }}/cover-server
  DOCKER_HUB_REPO_AGENT: ${{ secrets.DOCKER_USERNAME }}/cover-agent

jobs:
  # --- 自动构建 cover-server 任务 ---
  build-server:
    runs-on: ubuntu-latest
    steps:
      - name: 切换到代码
        uses: actions/checkout@v4

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 登录 Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: 构建并推送 cover-server 镜像
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ env.DOCKER_HUB_REPO_SERVER }}:latest
          build-args: |
            SERVICE_TYPE=server
            COV=yes

  # --- 手动构建 cover-agent 任务 ---
  build-agent:
    # 仅在手动触发且 build_agent 输入为 true 时执行
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.build_agent == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: 切换到代码
        uses: actions/checkout@v4

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 登录 Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: 构建并推送 cover-agent 镜像
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ env.DOCKER_HUB_REPO_AGENT }}:latest
          build-args: |
            SERVICE_TYPE=agent
            COV=no

  # --- 部署任务 ---
  deploy:
    needs: build-server
    # 允许代码推送或手动触发时部署
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: 切换代码
        uses: actions/checkout@v4

      - name: 在服务器创建部署路径
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: mkdir -p /home/ubuntu/workspace/services/codecoverage

      - name: 设置 SSH 密钥
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SERVER_SSH_KEY }}

      - name: 拷贝 docker-compose.yml 到服务器 (使用 rsync)
        run: |
          rsync -avz -e "ssh -o StrictHostKeyChecking=no" ./docker-compose.yml ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/home/ubuntu/workspace/services/codecoverage/

      - name: 部署到服务器 通过 SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /home/ubuntu/workspace/services/codecoverage
            # 登录 Docker Hub 以拉取私有镜像（如果需要）
            echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
            # 拉取最新镜像
            docker compose pull
            # 重启容器
            docker compose up -d
            # 清理无用镜像
            docker image prune -f
