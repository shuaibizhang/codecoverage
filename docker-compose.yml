version: '3.8'

services:
  minio:
    image: minio/minio:latest
    container_name: codecoverage-minio
    ports:
      - "9000:9000"    # API 端口
      - "9001:9001"    # 控制台管理界面端口
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password123
    volumes:
      - ./data/minio:/data
    command: server /data --console-address ":9001"
    restart: always

  # 可选：MinIO Client (mc) 用于自动创建 bucket
  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until (/usr/bin/mc config host add local http://minio:9000 admin password123) do echo 'Waiting for MinIO...' && sleep 1; done;
      /usr/bin/mc mb --ignore-existing local/coverage-reports;
      /usr/bin/mc anonymous set public local/coverage-reports;
      exit 0;
      "
