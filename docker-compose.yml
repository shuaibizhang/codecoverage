version: '3.8'

services:
  cover-server:
    image: zhangdashuaibi/cover-server:latest
    container_name: codecoverage-server
    environment:
      - SERVICE_TYPE=server
    ports:
      - "8080:8080"
    volumes:
      - ./conf:/app/conf
    restart: always

  cover-agent:
    image: zhangdashuaibi/cover-agent:latest
    container_name: codecoverage-agent
    environment:
      - SERVICE_TYPE=agent
      - COVER_ADDR=127.0.0.1:8080 # 假设待测服务也在同一网络命名空间
    network_mode: "service:cover-server"
    depends_on:
      - cover-server
    volumes:
      - ./conf:/app/conf
    restart: always