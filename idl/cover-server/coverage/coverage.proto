syntax = "proto3";

package api.v1.coverage;

option go_package = "github.com/shuaibizhang/codecoverage/idl/cover-server/coverage;coverage";

import "google/api/annotations.proto";

// CoverageService 提供覆盖率报告的查询、导航和详情获取
service CoverageService {
  // 根据业务维度查找覆盖率报告
  rpc GetReportInfo(GetReportInfoRequest) returns (GetReportInfoResponse) {
    option (google.api.http) = {
      post: "/api/v1/coverage/report"
      body: "*"
    };
  }

  // 获取目录树节点统计信息（支持分层加载）
  rpc GetTreeNodes(GetTreeNodesRequest) returns (GetTreeNodesResponse) {
    option (google.api.http) = {
      post: "/api/v1/coverage/tree"
      body: "*"
    };
  }

  // 获取文件覆盖率详情及源码内容
  rpc GetFileCoverage(GetFileCoverageRequest) returns (GetFileCoverageResponse) {
    option (google.api.http) = {
      post: "/api/v1/coverage/file"
      body: "*"
    };
  }

  // 获取指定测试类型的元数据列表 (Module, Branch, Commit)
  rpc GetMetadataList(GetMetadataListRequest) returns (GetMetadataListResponse) {
    option (google.api.http) = {
      get: "/api/v1/coverage/metadata"
    };
  }

  // 根据报告 ID 获取报告详情
  rpc GetReportInfoById(GetReportInfoByIdRequest) returns (GetReportInfoResponse) {
    option (google.api.http) = {
      post: "/api/v1/coverage/report_by_id"
      body: "*"
    };
  }

  // 上报单测任务元数据
  rpc UploadUnittestReport(UploadUnittestReportRequest) returns (UploadUnittestReportResponse) {
    option (google.api.http) = {
      post: "/api/v1/unittest/upload"
      body: "*"
    };
  }

  // 上报系统测试任务元数据
  rpc UploadSystestCoverData(UploadSystestCoverDataRequest) returns (UploadSystestCoverDataResponse) {
    option (google.api.http) = {
      post: "/api/v1/systest/upload"
      body: "*"
    };
  }

  // 合并多个覆盖率报告
  rpc MergeReports(MergeReportsRequest) returns (MergeReportsResponse) {
    option (google.api.http) = {
      post: "/api/v1/coverage/merge"
      body: "*"
    };
  }

  // 获取根目录覆盖率详情数据
  rpc GetRootCoverage(GetRootCoverageRequest) returns (GetRootCoverageResponse) {
    option (google.api.http) = {
      post: "/api/v1/coverage/root"
      body: "*"
    };
  }

  // 模糊匹配查询目录树节点
  rpc SearchNodes(SearchNodesRequest) returns (SearchNodesResponse) {
    option (google.api.http) = {
      post: "/api/v1/coverage/search"
      body: "*"
    };
  }

  // 创建覆盖率快照（固化当前报告）
  rpc CreateSnapshot(CreateSnapshotRequest) returns (CreateSnapshotResponse) {
    option (google.api.http) = {
      post: "/api/v1/coverage/snapshot"
      body: "*"
    };
  }
}

message CreateSnapshotRequest {
  string report_id = 1; // 需要创建快照的原始报告 ID (可以是合并后的 ID)
}

message CreateSnapshotResponse {
  string snapshot_report_id = 1; // 生成的快照报告 ID (PartitionKey)
  bool success = 2;
  string message = 3;
}

message ReportSelector {
  string module = 1;
  string branch = 2;
  string commit = 3;
  string type = 4; // "unittest", "systest", "combined" 等
}

message MergeReportsRequest {
  // 报告来源：支持直接使用 ID 或业务维度选择
  message ReportSource {
    oneof source {
      string report_id = 1;      // 报告唯一标识
      ReportSelector selector = 2; // 业务维度选择器
    }
  }

  // 基准报告：定义最终合并报告的代码版本、行号结构及基础覆盖率数据
  // 异源合并（不同 Commit）时，其他报告的覆盖率将映射到此基准报告的源码版本上
  ReportSource base_report = 1;

  // 待合并的其他报告列表
  repeated ReportSource other_reports = 2;
}

message MergeReportsResponse {
  string merged_report_id = 1; // 合并后生成的临时或持久化报告 ID
  bool success = 2;
  string message = 3;
}

message GetMetadataListRequest {
  string type = 1; // unittest, integrate, etc.
  string module = 2; // optional, filter branches and commits by module
  string branch = 3; // optional, filter commits by branch
}

message GetMetadataListResponse {
  repeated string modules = 1;
  repeated string branches = 2;
  repeated string commits = 3;
}

message UploadUnittestReportRequest {
  string language = 1;
  string module = 2;
  string branch = 3;
  string commit = 4;
  string base_commit = 5;
  string run_id = 6;
  string normal_cover_data_partition_key = 7;
  string report_partition_key = 8;
}

message UploadUnittestReportResponse {
  bool success = 1;
  string message = 2;
}

message CoverData {
  uint32 total_lines = 1;
  uint32 cover_lines = 2;
  uint32 instr_lines = 3;
  repeated int32 cover_line_data = 4;
}

message UploadSystestCoverDataRequest {
  string language = 1;
  string module = 2;
  string branch = 3;
  string commit = 4;
  string base_commit = 5;
  string host_ip = 6;

  string normal_cover_data_partition_key = 7;
  string report_partition_key = 8;

  map<string, CoverData> cover_data = 9;
  string created_time = 10;
}

message UploadSystestCoverDataResponse {
  bool success = 1;
  string message = 2;
}

message GetReportInfoRequest {
  string module = 1;
  string branch = 2;
  string commit = 3;
  string type = 4; // unit_test, auto_test, etc.
}

message MetaInfo {
  string module = 1;
  string branch = 2;
  string commit = 3;
  uint32 total_files = 4;
  uint32 coverage = 5;
  string last_update = 6;
}

message GetReportInfoResponse {
  string report_id = 1; // 报告唯一标识（通常是 PK 的 Marshal 字符串）
  MetaInfo meta = 2;
}

message GetReportInfoByIdRequest {
  string report_id = 1;
}

message GetTreeNodesRequest {
  string report_id = 1;
  string path = 2; // 目录路径，根目录传 ""
  bool is_increment = 3; // 是否查看增量
}

message TreeNodeStat {
  uint32 total_lines = 1;
  uint32 instr_lines = 2;
  uint32 cover_lines = 3;
  uint32 coverage = 4;
  uint32 add_lines = 5;
  uint32 delete_lines = 6;
  uint32 incr_instr_lines = 7;
  uint32 incr_cover_lines = 8;
  uint32 incr_coverage = 9;
  bool has_increment = 10; // 是否有增量数据
}

message TreeNode {
  string name = 1;
  string path = 2;
  int32 type = 3; // 0: Dir, 1: File
  TreeNodeStat stat = 4;
}

message GetTreeNodesResponse {
  repeated TreeNode nodes = 1;
}

message GetFileCoverageRequest {
  string report_id = 1;
  string path = 2;
}

message GetFileCoverageResponse {
  string path = 1;
  repeated uint32 lines = 2; // 编码后的覆盖率行数据
  uint32 file_flags = 3;
  string content = 4;        // 关键：文件源码内容（Base64 或 原始字符串）
}

message GetRootCoverageRequest {
  string report_id = 1;
}

message GetRootCoverageResponse {
  TreeNode root_node = 1;
}

message SearchNodesRequest {
  string report_id = 1;
  string keyword = 2; // 模糊匹配关键字
  bool is_increment = 3; // 是否只搜索有增量的节点
}

message SearchNodesResponse {
  repeated TreeNode nodes = 1;
}
